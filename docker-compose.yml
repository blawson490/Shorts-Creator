services:
  postgres:
    image: postgres:16-alpine
    container_name: shorts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shorts-net

  supabase-auth:
    image: supabase/gotrue:v2.177.0
    container_name: shorts-supabase-auth
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      GOTRUE_SITE_URL: ${SUPABASE_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${SUPABASE_URI_ALLOW_LIST}
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_JWT_EXP: ${SUPABASE_JWT_EXP}
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      API_EXTERNAL_URL: ${SUPABASE_AUTH_URL}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DISABLE_SIGNUP: ${SUPABASE_DISABLE_SIGNUP}
    ports:
      - "${SUPABASE_AUTH_PORT:-9999}:9999"
    networks:
      - shorts-net

  supabase-rest:
    image: postgrest/postgrest:v12.2.8
    container_name: shorts-supabase-rest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMA: ${SUPABASE_DB_SCHEMA}
      PGRST_DB_ANON_ROLE: ${SUPABASE_DB_ANON_ROLE}
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_SERVER_PORT: 3000
    ports:
      - "${SUPABASE_REST_PORT:-3000}:3000"
    networks:
      - shorts-net

  redis:
    image: redis:7-alpine
    container_name: shorts-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - shorts-net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: shorts-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - shorts-net

  web:
    image: alpine:3.20
    command: ["sh", "-c", "echo 'web placeholder service' && sleep infinity"]
    working_dir: /workspace
    volumes:
      - ./:/workspace
    networks:
      - shorts-net

  worker:
    build:
      context: apps/worker
    container_name: shorts-worker
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - minio
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${MINIO_BUCKET}
      SUPABASE_AUTH_URL: http://supabase-auth:9999
      SUPABASE_REST_URL: http://supabase-rest:3000
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    networks:
      - shorts-net

networks:
  shorts-net:
    name: shorts-net

volumes:
  postgres_data:
    name: shorts-postgres-data
  minio_data:
    name: shorts-minio-data
